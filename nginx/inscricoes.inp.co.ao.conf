# nginx/inscricoes.inp.co.ao.conf
# Colocar em: /etc/nginx/sites-available/inscricoes.inp.co.ao
# Activar com: ln -s /etc/nginx/sites-available/inscricoes.inp.co.ao /etc/nginx/sites-enabled/

# Rate limiting global
limit_req_zone $binary_remote_addr zone=geral:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;

server {
    listen 80;
    server_name inscricoes.inp.co.ao www.inscricoes.inp.co.ao;
    # Redirecionar para HTTPS (Cloudflare trata o SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name inscricoes.inp.co.ao www.inscricoes.inp.co.ao;

    # Certificado SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/inscricoes.inp.co.ao/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inscricoes.inp.co.ao/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/inp_access.log;
    error_log  /var/log/nginx/inp_error.log;

    # Tamanho máximo de upload (3 ficheiros × 10MB + overhead)
    client_max_body_size 35M;

    # ─── API Backend (Express na porta 4000) ─────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Health check ─────────────────────────────────────
    location /health {
        proxy_pass http://localhost:4000/health;
    }

    # ─── Frontend Next.js (porta 3000) ───────────────────
    location / {
        limit_req zone=geral burst=50 nodelay;

        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Ficheiros estáticos com cache agressiva ──────────
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Bloquear acesso directo à pasta de uploads por URL (servidos pela API com auth)
    location /uploads/ {
        deny all;
        return 403;
    }
}
